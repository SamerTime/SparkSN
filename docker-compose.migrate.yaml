services:
  supabase-migrate:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      PGSSLMODE: require
    volumes:
      - ./supabase/migrations:/migrations:ro
    command:
      - sh
      - -c
      - |
        connection="$${SUPABASE_DATABASE_URL:-$${SUPABASE_POOLER_DATABASE_URL:-}}"
        if [ -z "$$connection" ]; then
          echo "Missing SUPABASE_DATABASE_URL"
          exit 1
        fi
        for file in /migrations/*.sql; do
          echo "Applying $$file"
          psql "$$connection" --set ON_ERROR_STOP=1 --file "$$file"
        done
