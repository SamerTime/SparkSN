name: Supabase Prisma Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/supabase-prisma-migrate.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "prisma/**"

permissions:
  contents: read

concurrency:
  group: supabase-prisma-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Deploy Prisma migrations
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

    steps:
      - name: Check required secret
        if: ${{ env.DATABASE_URL == '' }}
        run: |
          echo "Missing SUPABASE_DATABASE_URL repository secret."
          exit 1

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Deploy migrations to Supabase
        run: pnpm prisma migrate deploy
